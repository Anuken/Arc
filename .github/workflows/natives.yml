name: Build Natives

on: [workflow_dispatch]

jobs:
  natives-linux-arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Build Linux Natives in Docker Container
        uses: ./.github/workflows/build-linux-natives
        id: docker

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: natives-linux.zip
          path: natives-linux.zip

  natives-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17
      - name: Install dependencies
        run: sudo apt install g++-mingw-w64 g++-mingw-w64-i686 g++-mingw-w64-x86-64 gcc-mingw-w64 gcc-mingw-w64-i686 gcc-mingw-w64-x86-64
      - name: Set env
        run: echo "NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
      - name: Build natives
        run: |
          ./gradlew arc-core:jnigenBuildAllWindows
          ./gradlew arc-core:jnigenBuildAllAndroid
          ./gradlew arc-core:jnigenBuildAllLinux
          ./gradlew extensions:freetype:jnigenBuildAllWindows
          ./gradlew extensions:freetype:jnigenBuildAllAndroid
          ./gradlew extensions:freetype:jnigenBuildAllLinux
          ./gradlew extensions:filedialogs:jnigenBuildAllWindows
          ./gradlew extensions:filedialogs:jnigenBuildAllLinux
        #  the SDL2 backend is being phased out
        #  ./gradlew backends:backend-sdl:jnigenBuildAllWindows
        #  ./gradlew backends:backend-sdl:jnigenBuildAllLinux
      - name: Upload arc-core natives
        uses: actions/upload-artifact@v5
        with:
          name: Arc-core natives
          path: |
            arc-core/build/natives
      - name: Upload freetype natives
        uses: actions/upload-artifact@v5
        with:
          name: Freetype natives
          path: |
            extensions/freetype/build/natives
      - name: Upload filedialog natives
        uses: actions/upload-artifact@v5
        with:
          name: Filedialogs natives
          path: |
            extensions/filedialogs/build/natives
  natives-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
      - name: Install dependencies
        run: |
          brew install sdl2
          brew install glew
      - name: Build natives
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.9'
        run: |
          ./gradlew arc-core:jnigenBuildAllMacOsX
          ./gradlew extensions:freetype:jnigenBuildAllMacOsX
          ./gradlew extensions:filedialogs:jnigenBuildAllMacOsX
      - name: Upload natives
        uses: actions/upload-artifact@v5
        with:
          name: Arc-core MacOS natives
          path: |
            arc-core/build/natives
            extensions/freetype/build/natives
            extensions/filedialogs/build/natives